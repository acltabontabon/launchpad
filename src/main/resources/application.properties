# Disable web server - this is a terminal app
spring.main.web-application-type=none

# Suppress Spring banner and console logging so TUI owns the terminal
spring.main.banner-mode=off
logging.level.root=OFF
logging.level.com.acltabontabon.launchpad=OFF

# Local-AI provider config. LlmProviderRouter reads these and selects the
# concrete backend at runtime. `provider=auto` probes the base URL at health
# check time (Ollama's /api/tags first, then OpenAI's /v1/models).
# Override per-user via the /settings TUI screen (persists to ~/.launchpad/config.properties)
# or via the LAUNCHPAD_LLM_API_KEY env var (overrides any api-key in the config file).
launchpad.ai.provider=auto
launchpad.ai.base-url=http://localhost:11434
launchpad.ai.model=qwen2.5-coder:7b-instruct
launchpad.ai.api-key=

# Spring AI autoconfig defaults. The router shadows these with its @Primary
# ChatModel; they exist only so the underlying starters can build their beans
# at startup before the router replaces the active delegate.
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5-coder:7b-instruct
spring.ai.openai.base-url=http://localhost:1234
spring.ai.openai.api-key=unused
spring.ai.openai.chat.options.model=local-model

# Timeouts on every Ollama HTTP call. Without these a hung daemon or stalled
# model freezes the TUI render thread indefinitely. connect-timeout bounds the
# TCP / HTTP connect phase; read-timeout bounds the whole response (also
# applied as a Reactor .timeout() on the streaming path).
launchpad.ai.connect-timeout=10s
launchpad.ai.read-timeout=2m

# Ollama runtime context window. The model's default is 4096 tokens, which
# silently truncates anything longer (Ollama logs `truncating input prompt`
# and the model echoes the tail back as the "output"). 8192 is a safety
# guard, NOT permission to return to large prompts; the synthesis pipeline
# stays under launchpad.ai.synthesis.max-input-chars per call.
launchpad.ai.ollama.num-ctx=8192

# Bounded local-AI synthesis. AGENTS.md is assembled deterministically by
# the template engine; only short body fragments are synthesised, one
# section at a time. Disable to fall back to deterministic-only output.
launchpad.ai.synthesis.enabled=true
launchpad.ai.synthesis.max-input-chars=2500
launchpad.ai.synthesis.max-output-chars=800

# Launchpad config
launchpad.scan.max-file-size-kb=512
launchpad.scan.skip-patterns=**/test/**,**/tests/**,**/*.test.*,**/*.spec.*,**/node_modules/**,**/.git/**,**/target/**,**/build/**,**/.idea/**,**/.vscode/**,**/__pycache__/**
launchpad.scan.include-test-names=true

# Standards audit - runs after scan when rules carry `check:` blocks.
launchpad.audit.enabled=true

# LLM-backed audit checks (`check.kind: llm`) are off by default because each
# rule fires up to 20 model calls (one per matched file), 5-10s each on the
# default model. Toggle in the TUI Settings screen (Audit card) or set
# `launchpad.audit.enable-llm-checks=true` in ~/.launchpad/config.properties.
# Deterministic checkers (pattern / import) always run regardless of this flag.
launchpad.audit.enable-llm-checks=false

# /new-task per-call budgets. interview-timeout bounds a single clarifying
# question turn; finalize-timeout bounds the synthesise call (which streams a
# multi-section markdown doc). Both apply as a Reactor `.timeout()` on the
# streamed read path - if the model stops emitting tokens for that duration
# the call surfaces a TimeoutException to the TUI instead of hanging.
launchpad.task.interview-timeout=60s
launchpad.task.finalize-timeout=120s
