# MCP server mode profile - active when Launchpad is invoked as `launchpad mcp`.
#
# stdout is owned by the MCP JSON-RPC protocol, so anything Spring writes there
# would corrupt the stream. We force the banner off and quiet startup so the
# first byte on stdout is the JSON-RPC handshake.

spring.main.banner-mode=off
spring.main.log-startup-info=false

# A useful baseline for debugging MCP clients - keep WARN+ visible on stderr
# (Spring's default console appender writes to stderr in Boot 3+, which is
# what we want here).
logging.level.root=WARN
logging.level.com.acltabontabon.launchpad=INFO

# Spring AI MCP server starter - stdio transport, no HTTP, no port binding.
# Tool / resource beans annotated with @Tool / @McpResource auto-register.
spring.ai.mcp.server.name=launchpad
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.stdio=true
